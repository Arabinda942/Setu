<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Setu -- Bridge Surplus to Need{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
  <div class="auth-navbar">
    <a href="{{ url_for('index') }}" class="brand">🌉 Setu</a>
    <nav style="display:flex; gap:16px; align-items:center;">
      <a href="{{ url_for('impact') }}" style="color:var(--text-muted); font-size:14px;">Impact</a>
      <a href="{{ url_for('login') }}" style="color:var(--text-muted); font-size:14px;">Log in</a>
      <a href="{{ url_for('register') }}" class="btn btn-primary btn-sm">Get started</a>
    </nav>
  </div>

  <div style="max-width:1100px; margin:0 auto; padding: 24px 20px;">
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="flash flash-{{ category }}">{{ message }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}
    {% block content %}{% endblock %}
  </div>
  <footer class="app-footer">Setu -- bridging surplus to need, one match at a time.</footer>
  <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
