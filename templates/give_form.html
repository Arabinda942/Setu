{% extends "base.html" %}
{% block page_title %}Post Surplus{% endblock %}
{% block content %}
<div class="card" style="max-width: 560px; margin: 0 auto;">
  <h2 style="margin-top:0;">🍲 Post something to give</h2>
  <form method="POST">
    <label>Category</label>
    <select name="category" required>
      {% for value, label in categories %}
        <option value="{{ value }}">{{ label }}</option>
      {% endfor %}
    </select>

    <label>Title</label>
    <input type="text" name="title" placeholder="e.g. 12 packed meals, still warm" required>

    <label>Description</label>
    <textarea name="description" placeholder="Any details that help someone decide if it fits their need"></textarea>

    <label>Quantity</label>
    <input type="text" name="quantity" placeholder='e.g. "6 meals", "2 hrs/week", "₹500"'>

    <label>Pickup by (optional -- important for perishables)</label>
    <input type="datetime-local" name="expires_at">

    <label>Address / area</label>
    <input type="text" name="address" placeholder="e.g. Park Street, Kolkata">
    <input type="hidden" name="lat" id="lat">
    <input type="hidden" name="lng" id="lng">
    <button type="button" class="btn btn-outline btn-sm" style="margin-top:10px;"
      onclick="useMyLocation('lat','lng','loc-status')">📍 Use my current location</button>
    <div id="loc-status" class="form-hint"></div>

    <button class="btn btn-primary" style="width:100%; margin-top: 20px;" type="submit">Post it</button>
  </form>
</div>
{% endblock %}
